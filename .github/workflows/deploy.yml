name: Deploy Die Meeples

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: |
          sed -i "s|'__SB_SERVICE_KEY__'|'${SB_SERVICE_KEY}'|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          include_files: index.html

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy BGG Proxy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bgg-proxy \
            --project-ref hsomxjwyzzgwxtjxvrts \
            --no-verify-jwt
